<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>مبيعات دبوس البسطة</title>
  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f7f7f7;
    }
    .logo-container {
      text-align: center;
    }
    .logo-container img {
      max-height: 80px;
      margin-bottom: 10px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }
    .controls label {
      white-space: nowrap;
    }
    .controls input, .controls select {
      padding: 8px;
    }
    .summary {
      margin: 10px 0;
      padding: 8px;
      background-color: #e0f7fa;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 5px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: right;
    }
    th {
      background-color: #007cba;
      color: white;
    }
  </style>
</head>
<body>

  <!-- اللوقو -->
  <div class="logo-container">
    <img src="logo.png" alt="شعار دبوس البسطة" />
  </div>

  <h1 style="text-align: center;">مبيعات دبوس البسطة - صندوق دبوس</h1>

  <!-- رأس الصفحة: مجموعات واختيارات -->
  <div class="controls">
    <div>
      <label>التاريخ:</label>
      <select id="selectDate">
        <option value="">الكل</option>
      </select>
    </div>
    <div>
      <label>العملية:</label>
      <select id="selectOperation">
        <option value="">الكل</option>
      </select>
    </div>
    <div>
      <label>فلتر البيان:</label>
      <input type="text" id="filterDescription" placeholder="بحث في البيانات" />
    </div>
    <div>
      <label>فلتر السعر:</label>
      <input type="text" id="filterAmount" placeholder="بحث في السعر" />
    </div>
    <button id="btnShow">إظهار البيانات</button>
  </div>

  <div class="summary">
    <span>إجمالي المبيع $: </span>
    <span id="totalAmount">0</span>
  </div>

  <!-- جدول العرض -->
  <div id="tableContainer">
    <table id="dataTable">
      <thead>
        <tr>
          <th>التاريخ</th>
          <th>البيان</th>
          <th>المبيع $</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    // اسم ملف Excel في نفس المجلد
    const EXCEL_FILE_NAME = "صندوق دبوس.xlsx";

    // --- تحميل ملف Excel ---
    async function loadWorkbook() {
      let workbook;

      try {
        const response = await fetch(EXCEL_FILE_NAME);
        const data = await response.arrayBuffer();
        workbook = XLSX.read(data, { type: "array" });
        return workbook;
      } catch (e) {
        alert("خطأ في قراءة ملف صندوق دبوس.xlsx:\n" + e.message);
        console.error(e);
        return null;
      }
    }

    // --- تحويل اسم الورقة مثل 08-04 إلى "Wednesday-08-Apr-2026" ---
    function sheetNameToFullDate(sheetName) {
      const m = sheetName.trim().match(/^(\d{2})-(\d{2})$/);
      if (!m) return sheetName;

      const day = parseInt(m[1], 10);
      const month = parseInt(m[2], 10);
      const year = 2026; // يمكنك تغييره لاحقًا إذا احتجت

      const date = new Date(year, month - 1, day);

      const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const dayName = days[date.getDay()];

      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const monthName = months[date.getMonth()];

      return `${dayName}-${day.toString().padStart(2, "0")}-${monthName}-${year}`;
    }

    // --- هل اسم الورقة على صيغة DD-MM مثل 01-03؟ ---
    function isDateSheetName(sheetName) {
      return /^\d{2}-\d{2}$/.test(sheetName.trim());
    }

    // --- جلب قائمة الأوراق حسب تاريخ ---
    function getValidSheets(workbook) {
      return workbook.SheetNames.filter(isDateSheetName);
    }

    // --- جلب قائمة "العمليات" من كل الأوراق ---
    function getOperationList(workbook) {
      const ops = new Set();
      const sheets = workbook.SheetNames.filter(isDateSheetName);

      sheets.forEach(sheetName => {
        const ws = workbook.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", blankrows: false });

        for (let i = 0; i < data.length; i++) {
          const row = data[i];
          const op = row[7]; // عمود H = index 7
          if (op && typeof op === "string" && op.trim() !== "") {
            ops.add(op.trim());
          }
        }
      });

      return Array.from(ops).sort();
    }

    // --- فحص إذا كان "مبيع $" عدد غير صفري (موجب أو سالب)، ولا يقبل 0 أو فارغ ---
    function isValidAmount(val) {
      if (val == null || val === "") return false;
      const num = parseFloat(val);
      return !isNaN(num) && num !== 0;
    }

    // --- جلب البيانات المفلترة من ورقة واحدة ---
    function getFilteredRows(workbook, sheetName, operation, descriptionFilter, amountFilter) {
      const ws = workbook.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

      const rows = [];
      const dateStr = sheetNameToFullDate(sheetName);

      for (let i = 0; i < data.length; i++) {
        const row = data[i];
        const op = row[7];      // H = index 7
        const desc = String(row[8] || "").trim(); // I = index 8
        const amount = row[11]; // L = index 11

        // تجاهل إذا كان "المبيع $" = 0 أو فارغ
        if (!isValidAmount(amount)) continue;

        if (!operation || op === operation) {
          // فلتر نصي للبيان
          if (descriptionFilter && !desc.includes(descriptionFilter)) {
            continue;
          }
          // فلتر نصي للسعر (مثلاً بحث في جزء من الرقم)
          const amountStr = amount.toString();
          if (amountFilter && !amountStr.includes(amountFilter)) {
            continue;
          }

          rows.push({
            date: dateStr,
            desc: desc,
            amount: parseFloat(amount)
          });
        }
      }

      return rows;
    }

    // --- ملء الجدول في HTML ---
    function renderTable(rows) {
      const tbody = document.getElementById("tableBody");

      tbody.innerHTML = "";

      if (rows.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = '<td colspan="3">لا توجد بيانات مطابقة للبحث.</td>';
        tbody.appendChild(tr);
        document.getElementById("totalAmount").textContent = "0";
        return;
      }

      let total = 0;
      rows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.date}</td>
          <td>${row.desc}</td>
          <td>${row.amount.toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
        total += row.amount;
      });

      document.getElementById("totalAmount").textContent = total.toFixed(2);
    }

    // --- الأحداث عند التغيير ---
    async function refreshPage() {
      const workbook = await loadWorkbook();
      if (!workbook) return;

      const selectDate = document.getElementById("selectDate");
      const selectOperation = document.getElementById("selectOperation");
      const filterDescription = document.getElementById("filterDescription");
      const filterAmount = document.getElementById("filterAmount");

      // --- 1. ملء خيار "التاريخ" ---
      const validSheets = getValidSheets(workbook);
      selectDate.innerHTML = '<option value="">الكل</option>';
      validSheets.forEach(sheet => {
        const opt = document.createElement("option");
        opt.value = sheet;
        opt.textContent = sheet; // اسم الورقة الحقيقي
        selectDate.appendChild(opt);
      });

      // --- 2. ملء خيار "العملية" ---
      const operations = getOperationList(workbook);
      selectOperation.innerHTML = '<option value="">الكل</option>';
      operations.forEach(op => {
        const opt = document.createElement("option");
        opt.value = op;
        opt.textContent = op;
        selectOperation.appendChild(opt);
      });

      // --- 3. عند الضغط على زر الإظهار ---
      const btnShow = document.getElementById("btnShow");
      btnShow.onclick = () => {
        const selectedDate = selectDate.value;
        const selectedOperation = selectOperation.value;
        const descFilter = filterDescription.value.trim();
        const amountFilter = filterAmount.value.trim();

        let allRows = [];
        let targetSheets = validSheets;

        if (selectedDate) {
          targetSheets = [selectedDate];
        }

        targetSheets.forEach(sheet => {
          const rowsInSheet = getFilteredRows(
            workbook,
            sheet,
            selectedOperation,
            descFilter,
            amountFilter
          );
          allRows = allRows.concat(rowsInSheet);
        });

        renderTable(allRows);
      };

      // --- 4. تصفية فورية أثناء الكتابة (رقم السعر فقط في الوقت الحالي) ---
      filterDescription.addEventListener("input", () => {
        btnShow.click();
      });
      filterAmount.addEventListener("input", () => {
        btnShow.click();
      });

      // تحميل بيانات "الكل" عند فتح الصفحة
      btnShow.click();
    }

    // --- تشغيل المنطق عند تحميل الصفحة ---
    window.addEventListener("load", refreshPage);
  </script>
</body>
</html>
